<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />
<title>Vitals · Personal Health Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0a0e14;
    --surface: #0f141c;
    --surface-2: #161c26;
    --border: #1f2733;
    --border-bright: #2a3444;
    --text: #e5ecf5;
    --text-dim: #6b7785;
    --text-faint: #3d4754;
    --accent: #00ff9c;
    --accent-dim: #00ff9c44;
    --warn: #ff5577;
    --travel: #5fb3ff;
    --cheat: #ffaa3d;
    --period: #ff66aa;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; -webkit-font-smoothing: antialiased; min-height: 100vh; }
  body {
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(0,255,156,0.04) 0%, transparent 40%),
      radial-gradient(ellipse at 100% 100%, rgba(95,179,255,0.04) 0%, transparent 40%);
  }
  .mono { font-family: 'JetBrains Mono', monospace; }
  .container { max-width: 1100px; margin: 0 auto; padding: 24px 20px 80px; }

  /* Header */
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .brand-mark { display: flex; align-items: center; gap: 12px; }
  .brand-dot { width: 10px; height: 10px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 12px var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .brand-text h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 2px; }
  .brand-text p { font-size: 11px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; }
  .header-meta { text-align: right; font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.05em; }
  .header-meta .live { color: var(--accent); display: inline-flex; align-items: center; gap: 6px; }
  .live::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 6px var(--accent); }

  /* Stats grid */
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  @media (max-width: 700px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 18px 16px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: ''; position: absolute; top: 0; left: 0; width: 30px; height: 1px;
    background: var(--accent);
  }
  .stat-label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; }
  .stat-value { font-size: 28px; font-weight: 500; letter-spacing: -0.02em; font-family: 'Space Grotesk', sans-serif; line-height: 1; }
  .stat-value .unit { font-size: 13px; color: var(--text-dim); font-weight: 400; margin-left: 4px; }
  .stat-sub { font-size: 11px; color: var(--text-dim); margin-top: 8px; font-family: 'JetBrains Mono', monospace; }
  .stat-sub.up { color: var(--warn); }
  .stat-sub.down { color: var(--accent); }

  /* Chart card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .card-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .card-body { padding: 20px; }
  .range-tabs { display: flex; gap: 1px; background: var(--border); }
  .range-tab {
    padding: 5px 12px; font-size: 11px; background: var(--surface);
    border: none; color: var(--text-dim); cursor: pointer;
    font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .range-tab:hover { color: var(--text); }
  .range-tab.active { background: var(--accent); color: var(--bg); font-weight: 700; }

  #weight-chart { width: 100%; height: 260px; }
  .chart-empty { padding: 60px 20px; text-align: center; color: var(--text-dim); font-style: italic; }

  /* Form */
  .form-card { background: var(--surface); border: 1px solid var(--border); padding: 20px; margin-bottom: 24px; }
  .date-row { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; margin-bottom: 18px; padding-bottom: 18px; border-bottom: 1px solid var(--border); }
  .date-input {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 14px;
    color-scheme: dark;
  }
  .date-input:focus { outline: none; border-color: var(--accent); }
  .nav-btn {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    width: 32px; height: 32px; cursor: pointer; font-family: 'JetBrains Mono', monospace;
    transition: all 0.15s; font-size: 14px;
  }
  .nav-btn:hover { color: var(--accent); border-color: var(--accent); }
  .today-badge { font-size: 10px; padding: 4px 8px; background: var(--accent-dim); color: var(--accent); letter-spacing: 0.2em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; font-weight: 700; }

  .day-tags { display: flex; gap: 8px; }
  .day-tag {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 14px; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; font-family: 'JetBrains Mono', monospace; font-weight: 500;
    transition: all 0.15s;
  }
  .day-tag:hover { border-color: var(--text-dim); color: var(--text); }
  .day-tag.active[data-tag="normal"] { background: var(--text-dim); color: var(--bg); border-color: var(--text-dim); }
  .day-tag.active[data-tag="cheat"] { background: var(--cheat); color: var(--bg); border-color: var(--cheat); }
  .day-tag.active[data-tag="travel"] { background: var(--travel); color: var(--bg); border-color: var(--travel); }

  /* Two-col field grid */
  .field-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; margin-bottom: 22px; }
  @media (max-width: 600px) { .field-grid { grid-template-columns: 1fr; } }
  .field-label { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .field-input-wrap { display: flex; align-items: baseline; gap: 8px; border-bottom: 1px solid var(--border); padding-bottom: 6px; transition: border-color 0.15s; }
  .field-input-wrap:focus-within { border-color: var(--accent); }
  .field-input {
    flex: 1; background: transparent; border: none; color: var(--text);
    font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 500;
    outline: none; padding: 0; min-width: 0; width: 100%;
  }
  .field-suffix { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; letter-spacing: 0.1em; }

  /* Toggle row */
  .toggle-row { display: flex; align-items: center; gap: 22px; margin-bottom: 22px; }
  .toggle {
    display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
  }
  .toggle-box {
    width: 36px; height: 20px; background: var(--border); border-radius: 0; position: relative; transition: 0.2s;
  }
  .toggle-box::after { content: ''; position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; background: var(--text-dim); transition: 0.2s; }
  .toggle input { display: none; }
  .toggle input:checked + .toggle-box { background: var(--period); }
  .toggle input:checked + .toggle-box::after { transform: translateX(16px); background: white; }
  .toggle-label { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .toggle input:checked ~ .toggle-label { color: var(--period); }

  /* Bowel grid */
  .bowel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
  .bowel-btn {
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text-dim);
    padding: 12px 6px; cursor: pointer; transition: all 0.15s; font-family: inherit; text-align: center;
  }
  .bowel-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .bowel-btn.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }
  .bowel-emoji { font-size: 20px; margin-bottom: 4px; display: block; }
  .bowel-label { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }

  /* Training */
  .training-grid { display: grid; grid-template-columns: 1.4fr 1fr; gap: 10px; }
  @media (max-width: 600px) { .training-grid { grid-template-columns: 1fr; } }
  .select, .text-input {
    width: 100%; background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; font-family: 'Space Grotesk', sans-serif;
    font-size: 14px; outline: none;
    color-scheme: dark;
  }
  .select { cursor: pointer; }
  .select:focus, .text-input:focus { border-color: var(--accent); }

  /* Collapsible */
  .collapsible { border: 1px solid var(--border); margin-bottom: 12px; }
  .collapsible-head {
    width: 100%; background: transparent; border: none; padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center; cursor: pointer;
    color: var(--text); text-align: left; font-family: inherit;
  }
  .collapsible-head:hover { background: var(--surface-2); }
  .collapsible-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; font-weight: 500; }
  .collapsible-preview { font-size: 12px; color: var(--text-faint); margin-top: 4px; font-style: italic; }
  .collapsible-icon { color: var(--text-dim); transition: transform 0.2s; }
  .collapsible.open .collapsible-icon { transform: rotate(180deg); }
  .collapsible-body { padding: 16px; border-top: 1px solid var(--border); background: var(--surface-2); display: none; }
  .collapsible.open .collapsible-body { display: block; }
  .meal-row { margin-bottom: 12px; }
  .meal-row:last-child { margin-bottom: 0; }
  .meal-row label { font-size: 10px; color: var(--text-dim); letter-spacing: 0.15em; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; display: block; margin-bottom: 4px; }
  .text-area {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); padding: 10px 12px; font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; outline: none; resize: vertical; min-height: 60px;
  }
  .text-area:focus { border-color: var(--accent); }

  /* Action buttons */
  .actions { display: flex; gap: 10px; margin-top: 22px; }
  .btn-primary {
    flex: 1; background: var(--accent); color: var(--bg); border: none;
    padding: 14px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; font-weight: 700;
    transition: 0.15s;
  }
  .btn-primary:hover { background: white; box-shadow: 0 0 20px var(--accent-dim); }
  .btn-danger {
    background: transparent; color: var(--warn); border: 1px solid var(--warn);
    padding: 14px 20px; cursor: pointer; font-family: inherit;
    transition: 0.15s;
  }
  .btn-danger:hover { background: var(--warn); color: var(--bg); }

  /* Recent log */
  .log-table { width: 100%; }
  .log-row {
    display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
    gap: 10px; padding: 12px 20px; border-top: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; align-items: center;
  }
  .log-row:hover { background: var(--surface-2); }
  .log-date { font-size: 13px; color: var(--text); font-weight: 500; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .log-day { font-size: 11px; color: var(--text-dim); margin-right: 4px; font-family: 'JetBrains Mono', monospace; }
  .log-tag { font-size: 9px; padding: 2px 6px; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .log-tag.cheat { background: var(--cheat); color: var(--bg); }
  .log-tag.travel { background: var(--travel); color: var(--bg); }
  .log-tag.period { background: var(--period); color: var(--bg); }
  .log-num { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--text); font-weight: 500; }
  .log-num.dim { color: var(--text-faint); }
  .log-icon { font-size: 14px; text-align: center; }
  .log-strength { font-size: 11px; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }

  @media (max-width: 700px) {
    .log-row { grid-template-columns: 1.5fr 1fr 1fr; }
    .log-cardio, .log-cal { display: none; }
  }

  /* Toast */
  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: var(--accent); color: var(--bg); padding: 12px 24px;
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.15em;
    text-transform: uppercase; font-weight: 700; opacity: 0;
    transition: all 0.3s; box-shadow: 0 4px 30px var(--accent-dim); z-index: 100;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.warn { background: var(--warn); box-shadow: 0 4px 30px rgba(255,85,119,0.3); }

  /* Footer info */
  .footer-info {
    margin-top: 40px; padding-top: 20px; border-top: 1px solid var(--border);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    font-size: 11px; color: var(--text-faint); font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
  }
  .footer-actions { display: flex; gap: 10px; }
  .footer-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 12px; cursor: pointer; font-family: inherit; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .footer-btn:hover { color: var(--accent); border-color: var(--accent); }
  .footer-btn.danger:hover { color: var(--warn); border-color: var(--warn); }

  /* Detail panel for selected day */
  .day-detail {
    background: var(--surface-2); border: 1px solid var(--border);
    padding: 14px 16px; margin-top: 12px; font-size: 12px; line-height: 1.6;
    color: var(--text-dim);
  }
  .day-detail strong { color: var(--text); font-weight: 500; }
  .day-detail .row { padding: 4px 0; border-bottom: 1px dashed var(--border); }
  .day-detail .row:last-child { border-bottom: none; }
</style>
</head>
<body>
<div class="container">

  <header class="header">
    <div class="brand-mark">
      <div class="brand-dot"></div>
      <div class="brand-text">
        <h1>VITALS</h1>
        <p>Personal Health OS</p>
      </div>
    </div>
    <div class="header-meta">
      <div class="live">SYSTEM ONLINE</div>
      <div id="header-date" style="margin-top: 4px;"></div>
    </div>
  </header>

  <!-- Stats -->
  <section class="stats-grid">
    <div class="stat">
      <div class="stat-label">Latest Weight</div>
      <div class="stat-value" id="stat-latest">—</div>
      <div class="stat-sub" id="stat-latest-sub">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">7-Day Avg</div>
      <div class="stat-value" id="stat-avg">—</div>
      <div class="stat-sub" id="stat-avg-sub">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Total Δ</div>
      <div class="stat-value" id="stat-change">—</div>
      <div class="stat-sub" id="stat-change-sub">—</div>
    </div>
    <div class="stat">
      <div class="stat-label">Streak</div>
      <div class="stat-value" id="stat-streak">—</div>
      <div class="stat-sub" id="stat-streak-sub">days logged</div>
    </div>
  </section>

  <!-- Chart -->
  <section class="card">
    <div class="card-header">
      <div class="card-title">// Weight Trajectory</div>
      <div class="range-tabs" id="range-tabs">
        <button class="range-tab" data-range="7">7D</button>
        <button class="range-tab active" data-range="30">30D</button>
        <button class="range-tab" data-range="90">90D</button>
        <button class="range-tab" data-range="365">1Y</button>
      </div>
    </div>
    <div class="card-body">
      <div id="chart-wrap"><canvas id="weight-chart"></canvas></div>
    </div>
  </section>

  <!-- Entry Form -->
  <section class="form-card">
    <div class="date-row">
      <button class="nav-btn" id="prev-day" title="Previous day">‹</button>
      <input type="date" class="date-input" id="entry-date" />
      <button class="nav-btn" id="next-day" title="Next day">›</button>
      <span id="today-badge" class="today-badge" style="display:none">TODAY</span>
      <span style="flex:1"></span>
      <button class="nav-btn" id="unit-toggle" style="width:auto; padding: 0 12px;" title="Toggle unit">KG</button>
    </div>

    <div style="margin-bottom: 22px;">
      <div class="field-label">Day Type</div>
      <div class="day-tags" id="day-tags">
        <button class="day-tag active" data-tag="normal">Normal</button>
        <button class="day-tag" data-tag="cheat">Cheat Day</button>
        <button class="day-tag" data-tag="travel">Travel</button>
      </div>
    </div>

    <div class="field-grid">
      <div>
        <div class="field-label">Weight (Morning)</div>
        <div class="field-input-wrap">
          <input type="number" step="0.1" class="field-input mono" id="weight-input" placeholder="0.0" />
          <span class="field-suffix" id="weight-unit">KG</span>
        </div>
      </div>
      <div>
        <div class="field-label">Calories</div>
        <div class="field-input-wrap">
          <input type="number" step="1" class="field-input mono" id="calorie-input" placeholder="0" />
          <span class="field-suffix">KCAL</span>
        </div>
      </div>
    </div>

    <div class="toggle-row">
      <label class="toggle">
        <input type="checkbox" id="period-toggle" />
        <span class="toggle-box"></span>
        <span class="toggle-label">Period Day</span>
      </label>
    </div>

    <div style="margin-bottom: 22px;">
      <div class="field-label">Bowel</div>
      <div class="bowel-grid" id="bowel-grid"></div>
    </div>

    <div style="margin-bottom: 22px;">
      <div class="field-label">Training</div>
      <div class="training-grid">
        <div>
          <div style="font-size:9px; color:var(--text-faint); letter-spacing:0.1em; margin-bottom:4px; font-family:'JetBrains Mono',monospace;">STRENGTH</div>
          <select class="select" id="strength-select"></select>
        </div>
        <div>
          <div style="font-size:9px; color:var(--text-faint); letter-spacing:0.1em; margin-bottom:4px; font-family:'JetBrains Mono',monospace;">CARDIO (MIN)</div>
          <input type="number" class="text-input mono" id="cardio-input" placeholder="0" />
        </div>
      </div>
    </div>

    <div class="collapsible" id="meals-collapsible">
      <button class="collapsible-head" data-target="meals-collapsible">
        <div>
          <div class="collapsible-title">// Diary · Meals & Supplements</div>
          <div class="collapsible-preview" id="meals-preview">Tap to log meals</div>
        </div>
        <span class="collapsible-icon">▾</span>
      </button>
      <div class="collapsible-body">
        <div class="meal-row"><label>Breakfast</label><input type="text" class="text-input" id="meal-breakfast" /></div>
        <div class="meal-row"><label>Lunch</label><input type="text" class="text-input" id="meal-lunch" /></div>
        <div class="meal-row"><label>Pre-workout</label><input type="text" class="text-input" id="meal-preworkout" /></div>
        <div class="meal-row"><label>Dinner</label><input type="text" class="text-input" id="meal-dinner" /></div>
        <div class="meal-row"><label>Supplements</label><input type="text" class="text-input" id="supplements-input" /></div>
      </div>
    </div>

    <div class="collapsible" id="remark-collapsible">
      <button class="collapsible-head" data-target="remark-collapsible">
        <div>
          <div class="collapsible-title">// Remark</div>
          <div class="collapsible-preview" id="remark-preview">Notes about energy, sleep, steps, etc.</div>
        </div>
        <span class="collapsible-icon">▾</span>
      </button>
      <div class="collapsible-body">
        <textarea class="text-area" id="remark-input" rows="4" placeholder="Energy level, sleep quality, steps, mood, anything else worth remembering..."></textarea>
      </div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="save-btn">Save Entry</button>
      <button class="btn-danger" id="delete-btn" title="Delete entry" style="display:none;">DELETE</button>
    </div>
  </section>

  <!-- Recent log -->
  <section class="card">
    <div class="card-header">
      <div class="card-title">// Recent Entries</div>
      <div style="font-size:10px; color:var(--text-dim); font-family:'JetBrains Mono',monospace; letter-spacing:0.1em;" id="entry-count">0 ENTRIES</div>
    </div>
    <div class="log-table" id="log-table"></div>
  </section>

  <div class="footer-info">
    <div>
      DATA STORED LOCALLY · NO SERVER · v1.0
    </div>

let entries = {};

// ============== UTILS ==============
function todayISO() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDate(iso) {
  const [y,m,d] = iso.split('-');
  return new Date(+y, +m-1, +d).toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
}
function formatShort(iso) {
  const [,m,d] = iso.split('-');
  return parseInt(m) + '/' + parseInt(d);
}
function shiftDate(iso, days) {
  const [y,m,d] = iso.split('-');
  const dt = new Date(+y, +m-1, +d);
  dt.setDate(dt.getDate() + days);
  return dt.getFullYear() + '-' + String(dt.getMonth()+1).padStart(2,'0') + '-' + String(dt.getDate()).padStart(2,'0');
}
function blankEntry() {
  return {
    weight: null, poop: 'none', period: false, dayTag: 'normal',
    strength: 'none', cardio: null,
    meals: { breakfast:'', lunch:'', preworkout:'', dinner:'' },
    supplements: '', calories: null, remark: '',
  };
}
function displayWeight(kg) { return kg == null ? null : (unit === 'kg' ? kg : kg * 2.20462); }

// ============== STORAGE ==============
function loadAll() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      entries = JSON.parse(stored);
    } else {
      // First load: seed with the user's spreadsheet data
      entries = JSON.parse(JSON.stringify(SEED_DATA));
      saveAll();
    }
    unit = localStorage.getItem(UNIT_KEY) || 'kg';
  } catch (e) {
    entries = {};
  }
}
function saveAll() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(entries)); }
  catch (e) { showToast('Storage failed', true); }
}

// ============== TOAST ==============
let toastTimer;
function showToast(msg, isWarn) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('warn', !!isWarn);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ============== STATS ==============
function computeStats() {
  const weighted = Object.entries(entries)
    .filter(([,e]) => e.weight != null)
    .sort(([a],[b]) => a.localeCompare(b));
  if (weighted.length === 0) return null;

  const latest = weighted[weighted.length-1][1].weight;
  const first = weighted[0][1].weight;
  const change = latest - first;

  const last7 = weighted.slice(-7);
  const avg = last7.reduce((s,[,e]) => s+e.weight, 0) / last7.length;

  let prevDelta = null;
  if (weighted.length >= 2) {
    const prev = weighted[weighted.length-2][1].weight;
    prevDelta = ((latest - prev) / prev) * 100;
  }

  return {
    latest: displayWeight(latest), avg: displayWeight(avg),
    change: displayWeight(change), prevDelta,
    count: Object.keys(entries).length,
    weightCount: weighted.length,
  };
}

function renderStats() {
  const s = computeStats();
  if (!s) {
    ['stat-latest','stat-avg','stat-change','stat-streak'].forEach(id => document.getElementById(id).textContent = '—');
    document.getElementById('stat-streak-sub').textContent = 'no entries yet';
    return;
  }
  document.getElementById('stat-latest').innerHTML = s.latest.toFixed(1) + '<span class="unit">' + unit + '</span>';
  document.getElementById('stat-avg').innerHTML = s.avg.toFixed(1) + '<span class="unit">' + unit + '</span>';

  const changeStr = (s.change >= 0 ? '+' : '') + s.change.toFixed(1);
  document.getElementById('stat-change').innerHTML = changeStr + '<span class="unit">' + unit + '</span>';

  const sub = document.getElementById('stat-latest-sub');
  if (s.prevDelta != null) {
    const sign = s.prevDelta >= 0 ? '+' : '';
    sub.textContent = sign + s.prevDelta.toFixed(2) + '% vs prev';
    sub.className = 'stat-sub ' + (s.prevDelta > 0.05 ? 'up' : s.prevDelta < -0.05 ? 'down' : '');
  } else {
    sub.textContent = '—';
  }

  const changeSub = document.getElementById('stat-change-sub');
  changeSub.textContent = 'since first log';
  changeSub.className = 'stat-sub ' + (s.change > 0.1 ? 'up' : s.change < -0.1 ? 'down' : '');

  document.getElementById('stat-avg-sub').textContent = 'last 7 weighed';
  document.getElementById('stat-streak').textContent = s.count;
  document.getElementById('stat-streak-sub').textContent = s.weightCount + ' with weight';
}

// ============== CHART ==============
function renderChart() {
  const sorted = Object.entries(entries)
    .filter(([,e]) => e.weight != null)
    .sort(([a],[b]) => a.localeCompare(b));

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - chartRange);

  const filtered = sorted.filter(([d]) => new Date(d) >= cutoff);

  const wrap = document.getElementById('chart-wrap');
  if (filtered.length === 0) {
    wrap.innerHTML = '<div class="chart-empty">// no data in range // log a weight to begin</div>';
    chart = null;
    return;
  }

  if (!document.getElementById('weight-chart')) {
    wrap.innerHTML = '<canvas id="weight-chart" style="width:100%;height:260px;"></canvas>';
  }

  const labels = filtered.map(([d]) => formatShort(d));
  const data = filtered.map(([,e]) => +displayWeight(e.weight).toFixed(2));
  const avg = data.reduce((a,b)=>a+b,0) / data.length;

  // Color points by day tag for visual richness
  const pointColors = filtered.map(([,e]) => {
    if (e.dayTag === 'cheat') return '#ffaa3d';
    if (e.dayTag === 'travel') return '#5fb3ff';
    if (e.period) return '#ff66aa';
    return '#00ff9c';
  });

  const ctx = document.getElementById('weight-chart').getContext('2d');
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Weight',
          data,
          borderColor: '#00ff9c',
          borderWidth: 2,
          tension: 0.25,
          pointBackgroundColor: pointColors,
          pointBorderColor: pointColors,
          pointRadius: 4,
          pointHoverRadius: 7,
          fill: true,
          backgroundColor: (ctx) => {
            const c = ctx.chart.ctx;
            const g = c.createLinearGradient(0, 0, 0, 240);
            g.addColorStop(0, 'rgba(0,255,156,0.18)');
            g.addColorStop(1, 'rgba(0,255,156,0)');
            return g;
          },
        },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { intersect: false, mode: 'index' },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#161c26',
          borderColor: '#00ff9c',
          borderWidth: 1,
          titleColor: '#e5ecf5',
          bodyColor: '#00ff9c',
          padding: 10,
          titleFont: { family: 'JetBrains Mono', size: 11, weight: '500' },
          bodyFont: { family: 'JetBrains Mono', size: 13, weight: '700' },
          callbacks: {
            label: (ctx) => '  ' + ctx.parsed.y.toFixed(2) + ' ' + unit,
            afterLabel: (ctx) => {
              const date = filtered[ctx.dataIndex][0];
              const e = filtered[ctx.dataIndex][1];
              const tags = [];
              if (e.dayTag === 'cheat') tags.push('CHEAT');
              if (e.dayTag === 'travel') tags.push('TRAVEL');
              if (e.period) tags.push('PERIOD');
              return tags.length ? '  ' + tags.join(' · ') : '';
            },
          },
        },
        annotation: {},
      },
      scales: {
        x: {
          grid: { color: '#1f2733', drawTicks: false },
          ticks: { color: '#6b7785', font: { family: 'JetBrains Mono', size: 10 }, maxRotation: 0, autoSkipPadding: 20 },
          border: { color: '#1f2733' },
        },
        y: {
          grid: { color: '#1f2733', drawTicks: false },
          ticks: { color: '#6b7785', font: { family: 'JetBrains Mono', size: 10 } },
          border: { color: '#1f2733' },
        },
      },
    },
  });
}

  document.getElementById('delete-btn').style.display = entries[selectedDate] ? 'inline-block' : 'none';
  document.getElementById('save-btn').textContent = entries[selectedDate] ? 'Update Entry' : 'Save Entry';
}

// ============== LOG TABLE ==============
function renderLog() {
  const recent = Object.entries(entries)
    .sort(([a],[b]) => b.localeCompare(a))
    .slice(0, 30);

  document.getElementById('entry-count').textContent = Object.keys(entries).length + ' ENTRIES';

  const html = recent.map(([date, e]) => {
    const poop = POOP_TYPES.find(p => p.id === e.poop);
    const strength = STRENGTH_OPTIONS.find(s => s.id === e.strength);
    const tags = [];
    if (e.dayTag === 'cheat') tags.push('<span class="log-tag cheat">CHEAT</span>');
    if (e.dayTag === 'travel') tags.push('<span class="log-tag travel">TRAVEL</span>');
    if (e.period) tags.push('<span class="log-tag period">P</span>');

    const [y,m,d] = date.split('-');
    const dt = new Date(+y, +m-1, +d);
    const dayShort = dt.toLocaleDateString('en-US', { weekday: 'short' });
    const monthDay = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

    const wStr = e.weight != null
      ? '<span class="log-num">' + displayWeight(e.weight).toFixed(1) + ' ' + unit + '</span>'
      : '<span class="log-num dim">—</span>';
    const cardioStr = e.cardio != null
      ? '<span class="log-num log-cardio">' + e.cardio + 'm</span>'
      : '<span class="log-num dim log-cardio">—</span>';
    const calStr = e.calories != null
      ? '<span class="log-num log-cal">' + e.calories + '</span>'
      : '<span class="log-num dim log-cal">—</span>';
    const poopStr = e.poop !== 'none'
      ? '<span class="log-icon" title="' + poop.label + '">' + poop.emoji + '</span>'
      : '<span class="log-icon" style="color:var(--text-faint)">—</span>';

    return '<div class="log-row" data-date="' + date + '">' +
      '<div class="log-date"><span class="log-day">' + dayShort + '</span>' + monthDay + ' ' + tags.join(' ') + '</div>' +
      wStr + cardioStr + calStr + poopStr +
      '</div>';
  }).join('');

  document.getElementById('log-table').innerHTML = html || '<div class="chart-empty">// no entries yet</div>';

  // Wire row clicks
  document.querySelectorAll('.log-row').forEach(row => {
    row.addEventListener('click', () => {
      selectedDate = row.dataset.date;
      renderForm();
      window.scrollTo({ top: document.querySelector('.form-card').offsetTop - 20, behavior: 'smooth' });
    });
  });
}

  const cardio = document.getElementById('cardio-input').value;
  const calories = document.getElementById('calorie-input').value;
  const activeBowel = document.querySelector('.bowel-btn.active');
  const activeTag = document.querySelector('.day-tag.active');

  return {
    weight,
    poop: activeBowel ? activeBowel.dataset.poop : 'none',
    period: document.getElementById('period-toggle').checked,
    dayTag: activeTag ? activeTag.dataset.tag : 'normal',
    strength: document.getElementById('strength-select').value,
    cardio: cardio ? parseInt(cardio) : null,
    meals: {
      breakfast: document.getElementById('meal-breakfast').value,
      lunch: document.getElementById('meal-lunch').value,
      preworkout: document.getElementById('meal-preworkout').value,
      dinner: document.getElementById('meal-dinner').value,
    },
    supplements: document.getElementById('supplements-input').value,
    calories: calories ? parseInt(calories) : null,
    remark: document.getElementById('remark-input').value,
  };
}

function isEmptyEntry(e) {
  return !e.weight && !e.calories && !e.cardio &&
    e.poop === 'none' && !e.period &&
    e.strength === 'none' && e.dayTag === 'normal' &&
    !e.meals.breakfast && !e.meals.lunch && !e.meals.preworkout && !e.meals.dinner &&
    !e.supplements && !e.remark;
}

function handleSave() {
  const draft = readDraft();
  if (isEmptyEntry(draft)) {
    showToast('Add at least one thing', true);
    return;
  }
  entries[selectedDate] = draft;
  saveAll();
  showToast('Saved');
  renderAll();
}

function handleDelete() {
  if (!entries[selectedDate]) return;
  if (!confirm('Delete entry for ' + formatDate(selectedDate) + '?')) return;
  delete entries[selectedDate];
  saveAll();
  showToast('Deleted');
  renderAll();
}

function handleUnit() {
  unit = unit === 'kg' ? 'lb' : 'kg';
  localStorage.setItem(UNIT_KEY, unit);
  renderAll();
}

function renderAll() {
  renderStats();
  renderChart();
  renderForm();
  renderLog();
}

// ============== INIT ==============
function init() {
  loadAll();

  // Header date
  document.getElementById('header-date').textContent =
    new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' }).toUpperCase();

  // Build bowel grid
  document.getElementById('bowel-grid').innerHTML = POOP_TYPES.map(p =>
    '<button class="bowel-btn" data-poop="' + p.id + '"><span class="bowel-emoji">' + p.emoji + '</span><span class="bowel-label">' + p.label + '</span></button>'
  ).join('');

  // Build strength select
  document.getElementById('strength-select').innerHTML = STRENGTH_OPTIONS.map(o =>
    '<option value="' + o.id + '">' + o.label + '</option>'
  ).join('');

  // Wire events
  document.getElementById('entry-date').addEventListener('change', (e) => {
    selectedDate = e.target.value;
    renderForm();
  });
  document.getElementById('prev-day').addEventListener('click', () => {
    selectedDate = shiftDate(selectedDate, -1);
    renderForm();
  });
  document.getElementById('next-day').addEventListener('click', () => {
    if (selectedDate < todayISO()) {
      selectedDate = shiftDate(selectedDate, 1);
      renderForm();
    }
  });

  document.querySelectorAll('.day-tag').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('.day-tag').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
    });
  });
  document.getElementById('bowel-grid').addEventListener('click', (e) => {
    const btn = e.target.closest('.bowel-btn');
    if (!btn) return;
    document.querySelectorAll('.bowel-btn').forEach(x => x.classList.remove('active'));
    btn.classList.add('active');
  });

  document.querySelectorAll('.range-tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.range-tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      chartRange = parseInt(t.dataset.range);
      renderChart();
    });
  });

  document.querySelectorAll('.collapsible-head').forEach(h => {
    h.addEventListener('click', () => {
      document.getElementById(h.dataset.target).classList.toggle('open');
    });
  });

  document.getElementById('save-btn').addEventListener('click', handleSave);
  document.getElementById('delete-btn').addEventListener('click', handleDelete);
  document.getElementById('unit-toggle').addEventListener('click', handleUnit);

  // Export
  document.getElementById('export-btn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'vitals-export-' + todayISO() + '.json';
    a.click();
    URL.revokeObjectURL(url);
    showToast('Exported');
  });

  // Import
  document.getElementById('import-btn').addEventListener('click', () => {
    document.getElementById('import-file').click();
  });
  document.getElementById('import-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const imported = JSON.parse(ev.target.result);
        if (typeof imported !== 'object') throw new Error('not object');
        if (!confirm('Import will MERGE with existing entries (existing dates get overwritten). Continue?')) return;
        entries = { ...entries, ...imported };
        saveAll();
        showToast('Imported ' + Object.keys(imported).length + ' entries');
        renderAll();
      } catch (err) {
        showToast('Invalid JSON file', true);
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  // Reset
  document.getElementById('reset-btn').addEventListener('click', () => {
    if (!confirm('Delete ALL entries? This cannot be undone.')) return;
    if (!confirm('Are you absolutely sure?')) return;
    entries = {};
    localStorage.removeItem(STORAGE_KEY);
    showToast('All data cleared');
    renderAll();
  });

  renderAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
